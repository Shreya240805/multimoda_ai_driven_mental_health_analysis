{% extends "base.html" %}

{% block title %}Login - Mental Health Assessment{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 100px auto;">
    <h2 style="text-align: center;">Welcome Back</h2>
    <p style="color: #888; margin-bottom: 30px; text-align: center;">
        Login to continue your mental health journey
    </p>
    
    <form method="POST">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required 
               placeholder="Enter your username" autofocus>
        
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required 
               placeholder="Enter your password">
        
        <div style="margin: 20px 0;">
            <label style="display: flex; align-items: center; cursor: pointer;">
                <input type="checkbox" name="remember" value="true" 
                       style="width: auto; margin-right: 10px; margin-bottom: 0;">
                <span style="font-size: 14px;">Remember me for 30 days</span>
            </label>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; color: #000;">
    Login
</button>
    </form>
    
    <p style="margin-top: 20px; text-align: center; color: #888;">
        Don't have an account? 
        <a href="{{ url_for('register') }}" style="color: #d4af37; font-weight: 600; text-decoration: none;">
            Sign up here
        </a>
    </p>
</div>
{% endblock %}
